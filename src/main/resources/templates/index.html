<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat + RAG Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font: 14px/1.6 -apple-system, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #1e1e30; margin-bottom: 20px; }
        .header h1 { font-size: 20px; color: #00d4aa; }
        .tabs { display: flex; gap: 4px; }
        .tab { padding: 8px 20px; border: 1px solid #1e1e30; border-radius: 8px 8px 0 0; cursor: pointer; background: #0d0d15; color: #666; font-size: 13px; }
        .tab.active { background: #14141f; color: #00d4aa; border-bottom-color: #14141f; }

        /* 聊天界面 */
        .chat-box { background: #14141f; border: 1px solid #1e1e30; border-radius: 0 12px 12px 12px; height: 500px; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #1e1e30; border-radius: 3px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; animation: fadeIn .3s; }
        .msg.user { background: #00d4aa22; border: 1px solid #00d4aa44; align-self: flex-end; color: #c0f0e0; }
        .msg.ai { background: #0d0d15; border: 1px solid #1e1e30; align-self: flex-start; }
        .msg.system { background: #1a1a2e; border: 1px solid #00d4aa22; align-self: center; font-size: 12px; color: #888; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .input-row { display: flex; gap: 8px; padding: 16px; border-top: 1px solid #1e1e30; }
        .input-row input { flex: 1; padding: 12px 16px; border: 1px solid #1e1e30; border-radius: 8px; background: #0d0d15; color: #e0e0e0; font-size: 14px; outline: none; }
        .input-row input:focus { border-color: #00d4aa; }
        .input-row button { padding: 10px 24px; }

        /* RAG界面 (原功能) */
        .rag-panel { display: none; }
        .card { background: #14141f; border: 1px solid #1e1e30; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        label { display: block; color: #888; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        textarea { width: 100%; padding: 12px; border: 1px solid #1e1e30; border-radius: 8px; background: #0d0d15; color: #e0e0e0; font-size: 14px; min-height: 80px; resize: vertical; }
        textarea:focus { outline: none; border-color: #00d4aa; }
        .upload-zone { border: 2px dashed #1e1e30; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: border .2s; }
        .upload-zone:hover { border-color: #00d4aa; }
        .upload-zone .icon { font-size: 40px; margin-bottom: 12px; }
        .actions { display: flex; gap: 12px; margin-top: 16px; }
        .response { margin-top: 12px; padding: 16px; background: #0d0d15; border: 1px solid #1e1e30; border-radius: 8px; white-space: pre-wrap; display: none; }
        .status { font-size: 12px; color: #666; margin-top: 8px; }

        button { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all .2s; }
        .btn-primary { background: #00d4aa; color: #0a0a0f; font-weight: 600; }
        .btn-primary:hover { background: #00e6b8; }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
        .btn-secondary { background: transparent; border: 1px solid #1e1e30; color: #888; }
        .btn-secondary:hover { border-color: #00d4aa44; color: #00d4aa; }
        .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #1e1e30; border-top-color: #00d4aa; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .typing::after { content: '▊'; animation: blink .8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧠 AI Chat + RAG</h1>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('chat')" id="tabChat">💬 对话</div>
            <div class="tab" onclick="switchTab('rag')" id="tabRag">📄 知识库</div>
        </div>
    </div>

    <!-- 聊天面板 -->
    <div id="panelChat" class="chat-box">
        <div class="messages" id="messages">
            <div class="msg system">基于 DeepSeek + Spring AI</div>
        </div>
        <div class="input-row">
            <input id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendChat()">
            <button class="btn-primary" onclick="sendChat()" id="chatBtn">发送</button>
            <button class="btn-secondary" onclick="clearChat()">清空</button>
        </div>
    </div>

    <!-- RAG面板 -->
    <div id="panelRag" class="rag-panel">
        <div class="card">
            <label>📄 上传知识文档</label>
            <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
                <div class="icon">📁</div>
                <p>点击上传 .txt / .md 文件</p>
                <p class="status">持久化存储在SQLite向量库</p>
            </div>
            <input type="file" id="fileInput" accept=".txt,.md" style="display:none" onchange="uploadFile(this)">
            <div class="status" id="uploadStatus"></div>
        </div>

        <div class="card">
            <label>💡 基于知识库提问</label>
            <textarea id="ragQuestion" placeholder="输入问题..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)askRag()"></textarea>
            <div class="actions">
                <button class="btn-primary" onclick="askRag()" id="ragBtn">提问</button>
            </div>
            <div class="response" id="ragResponse"></div>
        </div>
    </div>
</div>

<script>
// === 标签切换 ===
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    document.getElementById('panelChat').style.display = tab === 'chat' ? 'flex' : 'none';
    document.getElementById('panelRag').style.display = tab === 'rag' ? 'block' : 'none';
}

// === 对话 ===
async function sendChat() {
    var input = document.getElementById('chatInput');
    var msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, 'user');
    input.value = '';

    var aiMsg = addMessage('', 'ai');
    aiMsg.innerHTML = '<span class="loading"></span> 思考中...';

    try {
        var r = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: msg})
        });
        var d = await r.json();
        aiMsg.textContent = d.reply || d.error || '无响应';
    } catch(e) {
        aiMsg.textContent = '请求失败: ' + e.message;
    }

    var msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
}

function addMessage(text, role) {
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    document.getElementById('messages').appendChild(div);
    var msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
    return div;
}

async function clearChat() {
    await fetch('/api/chat/clear', {method: 'POST'});
    document.getElementById('messages').innerHTML = '<div class="msg system">对话已清空</div>';
}

// === RAG ===
async function askRag() {
    var q = document.getElementById('ragQuestion').value.trim();
    if (!q) return;
    var btn = document.getElementById('ragBtn');
    var resp = document.getElementById('ragResponse');
    btn.disabled = true;
    resp.style.display = 'block';
    resp.textContent = '思考中...';
    try {
        var r = await fetch('/api/rag/ask', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({question: q})
        });
        var d = await r.json();
        resp.textContent = d.answer || d.error || '无响应';
    } catch(e) {
        resp.textContent = '请求失败: ' + e.message;
    }
    btn.disabled = false;
}

async function uploadFile(input) {
    var file = input.files[0];
    if (!file) return;
    var status = document.getElementById('uploadStatus');
    status.textContent = '上传中...';
    var fd = new FormData();
    fd.append('file', file);
    try {
        var r = await fetch('/api/rag/upload', {method: 'POST', body: fd});
        var d = await r.json();
        status.textContent = d.message || d.error || '上传成功';
    } catch(e) {
        status.textContent = '上传失败: ' + e.message;
    }
    input.value = '';
}
</script>
</body>
</html>
