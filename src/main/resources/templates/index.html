<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent Workflow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font: 14px/1.6 -apple-system, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #1e1e30; margin-bottom: 20px; }
        .header h1 { font-size: 20px; color: #00d4aa; }
        .header .sub { font-size: 12px; color: #555; }
        .tabs { display: flex; gap: 4px; }
        .tab { padding: 8px 20px; border: 1px solid #1e1e30; border-radius: 8px 8px 0 0; cursor: pointer; background: #0d0d15; color: #666; font-size: 13px; transition: all .2s; }
        .tab.active { background: #14141f; color: #00d4aa; border-bottom-color: #14141f; }
        .tab:hover:not(.active) { border-color: #333; }

        .chat-box { background: #14141f; border: 1px solid #1e1e30; border-radius: 0 12px 12px 12px; height: 600px; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #1e1e30; border-radius: 3px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; animation: fadeIn .3s; }
        .msg.user { background: #00d4aa22; border: 1px solid #00d4aa44; align-self: flex-end; color: #c0f0e0; }
        .msg.ai { background: #0d0d15; border: 1px solid #1e1e30; align-self: flex-start; width: 100%; }
        .msg.system { background: #1a1a2e; border: 1px solid #00d4aa22; align-self: center; font-size: 11px; color: #666; text-align: center; }
        .msg .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-bottom: 6px; font-weight: 600; }
        .badge-cs { background: #4a90d922; color: #4a90d9; border: 1px solid #4a90d944; }
        .badge-analysis { background: #9b59b622; color: #9b59b6; border: 1px solid #9b59b644; }
        .badge-search { background: #e67e2222; color: #e67e22; border: 1px solid #e67e2244; }
        .badge-chat { background: #00d4aa22; color: #00d4aa; border: 1px solid #00d4aa44; }
        .badge-总结 { background: #e74c3c22; color: #e74c3c; border: 1px solid #e74c3c44; }
        .step-chain { background: #0a0a12; border: 1px solid #1a1a28; border-radius: 8px; padding: 10px 12px; margin: 8px 0; font-size: 12px; color: #555; }
        .step-chain .step { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
        .step-chain .step-name { color: #888; font-weight: 600; min-width: 50px; }
        .step-chain .step-arrow { color: #00d4aa44; }
        .step-chain .step-time { color: #444; font-size: 10px; margin-left: auto; }
        .ai-content { margin-top: 8px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .input-row { display: flex; gap: 8px; padding: 16px; border-top: 1px solid #1e1e30; }
        .input-row input { flex: 1; padding: 12px 16px; border: 1px solid #1e1e30; border-radius: 8px; background: #0d0d15; color: #e0e0e0; font-size: 14px; outline: none; }
        .input-row input:focus { border-color: #00d4aa; }

        .rag-panel { display: none; }
        .card { background: #14141f; border: 1px solid #1e1e30; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        label { display: block; color: #888; margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .upload-zone { border: 2px dashed #1e1e30; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: border .2s; }
        .upload-zone:hover { border-color: #00d4aa; }
        .upload-zone .icon { font-size: 40px; margin-bottom: 12px; }
        .status { font-size: 12px; color: #666; margin-top: 8px; }

        button { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all .2s; }
        .btn-primary { background: #00d4aa; color: #0a0a0f; font-weight: 600; }
        .btn-primary:hover { background: #00e6b8; }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
        .btn-secondary { background: transparent; border: 1px solid #1e1e30; color: #888; }
        .btn-secondary:hover { border-color: #00d4aa44; color: #00d4aa; }
        .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #1e1e30; border-top-color: #00d4aa; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .info-row { display: flex; gap: 8px; padding: 10px 20px; background: #0d0d15; border-bottom: 1px solid #1e1e30; font-size: 11px; color: #555; }
        .info-row .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #00d4aa; margin-right: 4px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

        .badge-{ font-size: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>🧠 Multi-Agent Workflow</h1>
            <div class="sub">LangChain4j · DeepSeek · 向量语义搜索 · 工作流编排</div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('chat')" id="tabChat">💬 对话</div>
            <div class="tab" onclick="switchTab('rag')" id="tabRag">📄 知识库</div>
        </div>
    </div>

    <div id="panelChat" class="chat-box">
        <div class="info-row">
            <span class="dot"></span>
            工作流编排 + 多轮对话记忆 · 客服 · 分析 · 搜索 · 对话 · 总结
        </div>
        <div class="messages" id="messages">
            <div class="msg system">
                🤖 多Agent工作流系统已就绪<br>
                <span style="font-size:10px;color:#444">
                自动规划 → 串行执行 → 汇总输出 · 支持多步协作
                </span>
            </div>
        </div>
        <div class="input-row">
            <input id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendChat()">
            <button class="btn-primary" onclick="sendChat()" id="chatBtn">发送</button>
            <button class="btn-secondary" onclick="clearChat()">清空</button>
        </div>
    </div>

    <div id="panelRag" class="rag-panel">
        <div class="card">
            <label>📄 上传知识文档</label>
            <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
                <div class="icon">📁</div>
                <p>点击上传 .txt / .md 文件</p>
                <p class="status">LangChain4j + DeepSeek Embedding 语义搜索</p>
            </div>
            <input type="file" id="fileInput" accept=".txt,.md" style="display:none" onchange="uploadFile(this)">
            <div class="status" id="uploadStatus"></div>
        </div>
    </div>
</div>

<script>
let agentColors = {
    '客服': 'cs', '分析': 'analysis', '搜索': 'search', '对话': 'chat', '总结': '总结', 'auto': 'chat'
};
let agentIcons = {
    '客服': '🎧', '分析': '📊', '搜索': '🔍', '对话': '💬', '总结': '📝'
};

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    document.getElementById('panelChat').style.display = tab === 'chat' ? 'flex' : 'none';
    document.getElementById('panelRag').style.display = tab === 'rag' ? 'block' : 'none';
}

async function sendChat() {
    var input = document.getElementById('chatInput');
    var msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, 'user');
    input.value = '';
    document.getElementById('chatBtn').disabled = true;

    var aiMsg = addMessage('', 'ai');
    aiMsg.innerHTML = '<span class="loading"></span> 规划中...';

    try {
        var r = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: msg})
        });
        var d = await r.json();

        if (d.error) {
            aiMsg.innerHTML = '❌ ' + (d.reply || '处理失败');
        } else {
            // 构建工作流链
            var steps = d.workflow || [];
            var chainHtml = '<div class="step-chain">';
            for (var i = 0; i < steps.length; i++) {
                var s = steps[i];
                var icon = agentIcons[s.agent] || '🤖';
                var color = agentColors[s.agent] || 'chat';
                chainHtml += '<div class="step">';
                chainHtml += '<span class="badge badge-' + color + '">' + icon + ' ' + s.agent + '</span>';
                chainHtml += '<span class="step-arrow">→</span>';
                chainHtml += '<span style="color:#777;font-size:11px;">' + (s.input?.length > 40 ? s.input.slice(0, 40) + '...' : s.input || '') + '</span>';
                chainHtml += '<span class="step-time">' + s.elapsedMs + 'ms</span>';
                chainHtml += '</div>';
            }
            chainHtml += '</div>';

            var reply = d.reply || '无响应';
            aiMsg.innerHTML = chainHtml + '<div class="ai-content">' + reply + '</div>';
        }
    } catch(e) {
        aiMsg.innerHTML = '请求失败: ' + e.message;
    }

    document.getElementById('chatBtn').disabled = false;
    var msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
}

function addMessage(text, role) {
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    if (role === 'user') {
        div.innerHTML = '<span class="badge badge-chat">👤 你</span>' + escapeHtml(text);
    }
    document.getElementById('messages').appendChild(div);
    var msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
    return div;
}

function escapeHtml(text) {
    var d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

async function clearChat() {
    document.getElementById('messages').innerHTML = '<div class="msg system">🤖 对话已清空</div>';
}

async function uploadFile(input) {
    var file = input.files[0];
    if (!file) return;
    var status = document.getElementById('uploadStatus');
    status.textContent = '上传中...';
    var fd = new FormData();
    fd.append('file', file);
    try {
        var r = await fetch('/api/rag/upload', {method: 'POST', body: fd});
        var d = await r.json();
        status.textContent = d.message || d.error || '上传成功';
    } catch(e) {
        status.textContent = '上传失败: ' + e.message;
    }
    input.value = '';
}
</script>
</body>
</html>
